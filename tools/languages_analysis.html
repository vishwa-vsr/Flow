<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Translation Key Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f131a;
            --card-bg: rgba(22, 28, 38, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 900px;
            padding: 2.5rem 1.5rem 1rem 1.5rem;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            margin: 0;
            font-weight: 700;
            background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header span {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        main {
            width: 100%;
            max-width: 900px;
            padding: 1.5rem;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-complete {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-incomplete {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .key-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
            border-left: 4px solid transparent;
        }

        .key-item.missing {
            background: rgba(239, 68, 68, 0.08);
            border-left-color: var(--accent-red);
            color: #fca5a5;
        }

        .key-item.extra {
            background: rgba(59, 130, 246, 0.08);
            border-left-color: var(--accent-blue);
            color: #93c5fd;
        }

        .key-item.complete {
            background: rgba(16, 185, 129, 0.08);
            border-left-color: var(--accent-green);
            color: #a7f3d0;
        }

        .key-item.checked code {
            text-decoration: line-through;
            opacity: 0.5;
        }

        code {
            background: rgba(255, 255, 255, 0.06);
            padding: 0.2rem 0.4rem;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85rem;
        }

        input[type="checkbox"] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--accent-red);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        input[type="checkbox"]:checked {
            background: var(--accent-red);
            border-color: var(--accent-red);
        }

        input[type="checkbox"]:checked::after {
            content: "✓";
            color: white;
            font-size: 11px;
            font-weight: bold;
        }

        .language-group {
            margin-bottom: 1rem;
        }

        .language-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s;
        }

        .language-header:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(4px);
        }

        .language-title {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .language-title::before {
            content: "▼";
            font-size: 0.7rem;
            transition: transform 0.2s;
        }

        .collapsed .language-title::before {
            transform: rotate(-90deg);
        }

        .collapsed .key-list {
            display: none;
        }

        .key-list {
            padding: 0.75rem 0 0 1rem;
        }

        .metrics {
            font-size: 0.8rem;
            display: flex;
            gap: 0.75rem;
        }

        .metric-missing {
            color: var(--accent-red);
        }

        .metric-extra {
            color: var(--accent-blue);
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>Flow Translation Key Analyzer</h1>
            <span>Reference English Keys: 629</span>
        </div>
    </header>
    <main>
        <div class="card">
            <h2 class="card-title">Completed Languages</h2>
            <ul id="complete-list"></ul>
        </div>
        <div class="card">
            <h2 class="card-title">Incomplete Languages</h2>
            <div id="incomplete-list"></div>
        </div>
    </main>

    <script>
        const analysisData = {
  "es": {
    "name": "Spanish (Espa\u00f1ol)",
    "missing": [],
    "extra": [],
    "isComplete": true
  },
  "zh_CN": {
    "name": "Chinese (Simplified) (\u7b80\u4f53\u4e2d\u6587)",
    "missing": [],
    "extra": [],
    "isComplete": true
  },
  "zh_HK": {
    "name": "Chinese (Hong Kong) (\u7e41\u9ad4\u4e2d\u6587 - \u9999\u6e2f)",
    "missing": [],
    "extra": [],
    "isComplete": true
  },
  "zh_TW": {
    "name": "Chinese (Traditional) (\u7e41\u9ad4\u4e2d\u6587)",
    "missing": [],
    "extra": [],
    "isComplete": true
  }
};

        const completeList = document.getElementById("complete-list");
        const incompleteList = document.getElementById("incomplete-list");

        // Render completed
        let hasComplete = false;
        let hasIncomplete = false;

        for (const [lang, data] of Object.entries(analysisData)) {
            if (data.isComplete) {
                hasComplete = true;
                const li = document.createElement("li");
                li.className = "key-item complete";
                li.innerHTML = `<strong>${data.name}</strong> is fully aligned with English (no missing or extra keys).`;
                completeList.appendChild(li);
            } else {
                hasIncomplete = true;
                const group = document.createElement("div");
                group.className = "language-group collapsed";
                
                const header = document.createElement("div");
                header.className = "language-header";
                header.innerHTML = `
                    <div class="language-title">${data.name}</div>
                    <div class="metrics">
                        <span class="metric-missing">-${data.missing.length} missing</span>
                        <span class="metric-extra">+${data.extra.length} extra</span>
                    </div>
                `;
                
                header.addEventListener("click", () => {
                    group.classList.toggle("collapsed");
                });

                const list = document.createElement("div");
                list.className = "key-list";

                data.missing.forEach(key => {
                    const item = document.createElement("div");
                    item.className = "key-item missing";
                    item.innerHTML = `
                        <input type="checkbox" onchange="this.closest('.key-item').classList.toggle('checked', this.checked)">
                        <span>Missing key: <code>${key}</code></span>
                    `;
                    list.appendChild(item);
                });

                data.extra.forEach(key => {
                    const item = document.createElement("div");
                    item.className = "key-item extra";
                    item.innerHTML = `
                        <span>Extra key: <code>${key}</code></span>
                    `;
                    list.appendChild(item);
                });

                group.appendChild(header);
                group.appendChild(list);
                incompleteList.appendChild(group);
            }
        }

        if (!hasComplete) {
            completeList.innerHTML = `<li class="key-item" style="color: var(--text-muted)">No languages are fully complete yet.</li>`;
        }
        if (!hasIncomplete) {
            incompleteList.innerHTML = `<div class="key-item complete" style="justify-content: center;">All locales are 100% complete and aligned!</div>`;
        }
    </script>
</body>
</html>
