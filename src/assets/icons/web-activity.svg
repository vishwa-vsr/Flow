<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Stopwatch top winding stem (dark teal) -->
  <rect x="59" y="16" width="10" height="12" fill="#004b66" />
  <rect x="46" y="8" width="36" height="8" rx="3" fill="#004b66" />
  
  <!-- Stopwatch side ears (dark teal) -->
  <!-- Left Ear -->
  <line x1="38" y1="44" x2="28" y2="34" stroke="#004b66" stroke-width="8" stroke-linecap="round" />
  <circle cx="26" cy="32" r="7" fill="#004b66" />
  <!-- Right Ear -->
  <line x1="90" y1="44" x2="100" y2="34" stroke="#004b66" stroke-width="8" stroke-linecap="round" />
  <circle cx="102" cy="32" r="7" fill="#004b66" />
  
  <!-- Outer casing circle ring (dark teal) -->
  <circle cx="64" cy="70" r="44" fill="none" stroke="#004b66" stroke-width="8" />
  
  <!-- Solid white background circle (creates the white ring gap) -->
  <circle cx="64" cy="70" r="40" fill="#ffffff" />
  
  <!-- Inner green face -->
  <circle cx="64" cy="70" r="34" fill="#61bd4f" />
  
  <!-- White tick marks inside the green face (aligned at 12, 3, 6, 9 o'clock) -->
  <line x1="64" y1="36" x2="64" y2="44" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
  <line x1="64" y1="104" x2="64" y2="96" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
  <line x1="36" y1="70" x2="44" y2="70" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
  <line x1="92" y1="70" x2="84" y2="70" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
  
  <!-- Stopwatch hand pointing at 2 o'clock -->
  <line x1="64" y1="70" x2="82" y2="52" stroke="#004b66" stroke-width="10" stroke-linecap="round" />
</svg>
